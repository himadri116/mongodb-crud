<!DOCTYPE html>
<html>
<head>
<title>University Relationships</title>
<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 30px;
}

h1 { color: #60a5fa }

.card {
  background: #1e293b;
  padding: 20px;
  margin: 15px 0;
  border-radius: 10px;
}

button {
  padding: 10px;
  background: #3b82f6;
  border: none;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>🎓 University System</h1>

<div class="card">
<h2>Departments (One-to-Many)</h2>
<button onclick="loadDepartments()">Load</button>
<ul id="departments"></ul>
</div>

<div class="card">
<h2>Students (Many-to-Many Courses)</h2>
<button onclick="loadStudents()">Load</button>
<ul id="students"></ul>
</div>

<script>
async function loadDepartments() {
  const data = await fetch('/api/departments').then(r => r.json());
  document.getElementById('departments').innerHTML =
    data.map(d => `<li>${d.name} (${d.building})</li>`).join('');
}

async function loadStudents() {
  const data = await fetch('/api/students').then(r => r.json());
  document.getElementById('students').innerHTML =
    data.map(s => `
      <li>
        ${s.name} - ${s.department?.name} <br>
        Courses: ${s.courses.map(c => c.name).join(', ')}
      </li>
    `).join('');
}
</script>

</body>
</html>
